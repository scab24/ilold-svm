[workspace]
resolver = "2"
members = [
    "crates/ilold-core",
    "crates/ilold-cli",
    "crates/ilold-web",
]

# Shared dependency versions — referenced via { workspace = true } in member crates
[workspace.dependencies]
# Pinned: no API stability guarantee between patch versions
solar = { version = "=0.1.8", package = "solar-compiler", default-features = false }
petgraph = "0.8"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
anyhow = "1"
clap = { version = "4", features = ["derive"] }

[profile.release]
lto = "thin"
codegen-units = 1
