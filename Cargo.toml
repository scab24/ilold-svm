[workspace]
resolver = "2"
members = [
    "crates/ilold-core",
    "crates/ilold-cli",
    "crates/ilold-web",
    "crates/ilold-session-core",
    "crates/ilold-solana-core",
]

[workspace.package]
edition = "2024"
version = "0.1.0"

[workspace.dependencies]
solar = { version = "=0.1.8", package = "solar-compiler", default-features = false }
petgraph = "0.8"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
anyhow = "1"
clap = { version = "4", features = ["derive"] }
tokio = { version = "1", features = ["full"] }
axum = { version = "0.8", features = ["ws"] }
tower-http = { version = "0.6", features = ["cors", "fs"] }

[profile.release]
lto = "thin"
codegen-units = 1
