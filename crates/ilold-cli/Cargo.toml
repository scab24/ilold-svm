[package]
name = "ilold-cli"
version = "0.1.0"
edition = "2021"
description = "CLI for Ilold: smart contract execution path analyzer"

[[bin]]
name = "ilold"
path = "src/main.rs"

[dependencies]
ilold-core = { path = "../ilold-core" }
ilold-web = { path = "../ilold-web" }
anyhow = { workspace = true }
clap = { workspace = true }
tokio = { workspace = true }
colored = "3"
reedline = "0.46"
nu-ansi-term = "0.50"
reqwest = { version = "0.12", features = ["json"] }
serde_json = { workspace = true }
dirs = "6"
